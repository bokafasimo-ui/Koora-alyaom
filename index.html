<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>مركز المباريات المباشر</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
  :root{
    --bg-deep:#2c3548;
    --bg-panel:#333d54;
    --bg-panel-2:#3a455e;
    --neon-blue:#00f2fe;
    --neon-green:#00ffb0;
    --live-red:#ff2d55;
    --text-main:#eef2f7;
    --text-dim:#8b93a7;
    --border-soft:rgba(255,255,255,0.06);
  }

  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
  }

  html,body{
    background:var(--bg-deep);
    color:var(--text-main);
    font-family:'Cairo', sans-serif;
    min-height:100%;
    -webkit-font-smoothing:antialiased;
  }

  body{
    background:
      radial-gradient(circle at 15% 0%, rgba(0,242,254,0.07), transparent 40%),
      radial-gradient(circle at 90% 10%, rgba(0,255,176,0.05), transparent 45%),
      var(--bg-deep);
    padding:16px;
  }

  /* ===== Header ===== */
  header{
    max-width:1200px;
    margin:0 auto 20px auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 18px;
    background:linear-gradient(180deg, var(--bg-panel), var(--bg-panel-2));
    border:1px solid var(--border-soft);
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.45);
  }

  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:800;
    font-size:1.15rem;
    letter-spacing:0.3px;
  }

  .brand .dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:var(--neon-green);
    box-shadow:0 0 10px var(--neon-green), 0 0 20px var(--neon-green);
  }

  .brand span.accent{
    background:linear-gradient(90deg, var(--neon-blue), var(--neon-green));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }

  .live-tag{
    display:flex;
    align-items:center;
    gap:8px;
    background:rgba(255,45,85,0.1);
    border:1px solid rgba(255,45,85,0.35);
    color:var(--live-red);
    font-weight:700;
    font-size:0.8rem;
    padding:6px 14px;
    border-radius:999px;
  }

  .pulse-dot{
    width:9px;
    height:9px;
    border-radius:50%;
    background:var(--live-red);
    box-shadow:0 0 0 0 rgba(255,45,85,0.7);
    animation:pulse 1.6s infinite;
  }

  @keyframes pulse{
    0%{ box-shadow:0 0 0 0 rgba(255,45,85,0.6); }
    70%{ box-shadow:0 0 0 10px rgba(255,45,85,0); }
    100%{ box-shadow:0 0 0 0 rgba(255,45,85,0); }
  }

  /* ===== Layout ===== */
  main{
    max-width:1200px;
    margin:0 auto;
    display:grid;
    grid-template-columns:1fr;
    gap:20px;
  }

  @media (min-width:960px){
    main{
      grid-template-columns:1.15fr 1fr;
      align-items:start;
    }
  }

  section.card{
    background:linear-gradient(180deg, var(--bg-panel), var(--bg-panel-2));
    border:1px solid var(--border-soft);
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.5);
    overflow:hidden;
  }

  .card-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 18px;
    border-bottom:1px solid var(--border-soft);
  }

  .card-header h2{
    font-size:1rem;
    font-weight:700;
    display:flex;
    align-items:center;
    gap:8px;
  }

  .card-header h2 .icon{
    color:var(--neon-blue);
    font-size:1.1rem;
  }

  .badge-soft{
    font-size:0.7rem;
    color:var(--text-dim);
    border:1px solid var(--border-soft);
    padding:4px 10px;
    border-radius:999px;
  }

  /* ===== Matches List Section ===== */
  .scores-body{
    padding:12px;
    background:#333d54;
    min-height:200px;
  }

  .match-list{
    display:flex;
    flex-direction:column;
    gap:10px;
    max-height:420px;
    overflow-y:auto;
  }

  .match-item{
    display:flex;
    flex-direction:column;
    gap:10px;
    background:linear-gradient(180deg, #131a28, #10151f);
    border:1px solid var(--border-soft);
    border-radius:14px;
    padding:14px;
    cursor:pointer;
    transition:border-color .15s ease, transform .15s ease, box-shadow .15s ease;
  }

  .match-item:hover,
  .match-item:focus-visible{
    border-color:rgba(0,242,254,0.45);
    transform:translateY(-1px);
    box-shadow:0 8px 20px rgba(0,242,254,0.08);
    outline:none;
  }

  .match-league-header{
    font-size:0.72rem;
    font-weight:700;
    color:var(--text-dim);
    text-align:center;
    border-bottom:1px solid var(--border-soft);
    padding-bottom:8px;
  }

  .match-card-body{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
  }

  .match-team{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    text-align:center;
  }

  .team-flag-img{
    width:36px;
    height:36px;
    object-fit:cover;
    border-radius:50%;
    border:1px solid var(--border-soft);
  }

  .team-flag-text{
    width:36px;
    height:36px;
    border-radius:50%;
    border:1px solid var(--border-soft);
    background:rgba(255,255,255,0.06);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:0.62rem;
    font-weight:800;
    color:var(--text-main);
  }

  .team-name{
    font-size:0.82rem;
    font-weight:700;
  }

  .match-center{
    flex:0 0 auto;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    min-width:96px;
  }

  .match-clock{
    font-size:0.75rem;
    font-weight:700;
    color:var(--neon-blue);
  }

  .match-status-pill{
    font-size:0.72rem;
    font-weight:700;
    color:var(--text-dim);
    background:rgba(255,255,255,0.04);
    border:1px solid var(--border-soft);
    padding:5px 12px;
    border-radius:999px;
    text-align:center;
    white-space:nowrap;
  }

  .match-status-pill.live{
    color:var(--live-red);
    background:rgba(255,45,85,0.08);
    border-color:rgba(255,45,85,0.3);
  }

  .match-status-pill.finished{
    color:var(--neon-green);
    background:rgba(0,255,176,0.06);
    border-color:rgba(0,255,176,0.25);
  }

  .match-item.disabled{
    cursor:not-allowed;
    opacity:0.55;
  }

  .match-item.disabled:hover{
    border-color:var(--border-soft);
    transform:none;
    box-shadow:none;
  }

  .list-state{
    text-align:center;
    color:var(--text-dim);
    font-size:0.85rem;
    padding:30px 10px;
  }



  /* ===== Stream Section ===== */
  .stream-body{
    padding:16px;
  }

  .video-container{
    position:relative;
    width:100%;
    padding-top:56.25%; /* 16:9 */
    background:#000;
    border-radius:14px;
    overflow:hidden;
    border:1px solid var(--border-soft);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,0.02), 0 10px 25px rgba(0,0,0,0.5);
  }

  .video-container .frame-inner{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    border:0;
    background:radial-gradient(circle at 50% 40%, #131a28, #05070d 75%);
  }

  .video-placeholder{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:10px;
    color:var(--text-dim);
    text-align:center;
    padding:20px;
  }

  .video-placeholder .play-btn{
    width:64px;
    height:64px;
    border-radius:50%;
    background:linear-gradient(135deg, var(--neon-blue), var(--neon-green));
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 0 25px rgba(0,242,254,0.35);
  }

  .video-placeholder .play-btn::after{
    content:'';
    border-style:solid;
    border-width:10px 0 10px 16px;
    border-color:transparent transparent transparent #0b0f19;
    margin-right:-3px;
  }

  .video-placeholder strong{
    color:var(--text-main);
    font-size:0.95rem;
  }

  .video-placeholder small{
    font-size:0.75rem;
    line-height:1.6;
    max-width:320px;
  }

  .stream-footer{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:14px;
    flex-wrap:wrap;
    gap:10px;
  }

  .live-badge-lg{
    display:flex;
    align-items:center;
    gap:8px;
    background:rgba(0,255,176,0.08);
    border:1px solid rgba(0,255,176,0.3);
    color:var(--neon-green);
    font-weight:700;
    font-size:0.8rem;
    padding:8px 16px;
    border-radius:999px;
  }

  .stream-footer .note{
    color:var(--text-dim);
    font-size:0.72rem;
  }

  footer{
    max-width:1200px;
    margin:24px auto 10px auto;
    text-align:center;
    color:var(--text-dim);
    font-size:0.75rem;
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="dot"></span>
    مركز <span class="accent">المباريات</span>
  </div>
  <div class="live-tag">
    <span class="pulse-dot"></span>
    مباشر الآن • LIVE
  </div>
</header>

<main>

  <!-- قسم جدول المباريات -->
  <section class="card">
    <div class="card-header">
      <h2><span class="icon">⚽</span> جدول مباريات اليوم</h2>
      <span class="badge-soft">تحديث تلقائي</span>
    </div>
    <div class="scores-body">
      <div id="matchList" class="match-list">
        <div class="list-state">جارِ تحميل مباريات اليوم…</div>
      </div>
    </div>
  </section>

  <!-- قسم البث المباشر -->
  <section class="card" id="streamSection">
    <div class="card-header">
      <h2><span class="icon">📺</span> البث المباشر</h2>
      <span class="badge-soft">HD</span>
    </div>
    <div class="stream-body">
      <div class="video-container">
        <!-- سيتم إدراج iframe البث هنا تلقائياً عبر الجافاسكريبت عند توفر رابط -->
        <iframe id="streamFrame" class="frame-inner" style="display:none" allowfullscreen allow="autoplay; fullscreen"></iframe>

        <div class="video-placeholder" id="streamPlaceholder">
          <div class="play-btn"></div>
          <strong id="streamTitle">لا يوجد بث نشط حالياً</strong>
          <small>سيظهر البث هنا تلقائياً بمجرد ضبط رابط CURRENT_LIVE_STREAM_URL في الكود.</small>
        </div>
      </div>

      <div class="stream-footer">
        <div class="live-badge-lg">
          <span class="pulse-dot"></span>
          جاهز للبث
        </div>
        <span class="note">يرجى استخدام مصادر بث مرخّصة فقط</span>
      </div>
    </div>
  </section>

</main>

<footer>
  جميع الحقوق محفوظة — تصميم فاخر لعشاق الرياضة
</footer>

<script>
/* =========================================================
   إعدادات الـ API — عدّل هذا الجزء فقط عند ربط مصدر بياناتك
   =========================================================
   API_URL  : رابط الـ API الذي يرجع مباريات اليوم بصيغة JSON
   API_KEY  : مفتاح الـ API إن كان مطلوباً (اتركه فارغاً "" إن لم يكن هناك مفتاح)
   API_HEADER_NAME : اسم الترويسة (Header) التي يتوقعها الـ API لإرسال المفتاح
                     (بعض الخدمات تستخدم "x-apisports-key" أو "Authorization" ...الخ)
   ========================================================= */
  /* =========================================================
     مصدر بيانات المباريات
     =========================================================
     الصفحة لا تتصل بأي API مباشرة ولا تحتوي على أي مفتاح سري.
     البيانات تُقرأ من ملف matches.json الموجود في نفس المستودع،
     وهذا الملف يُحدَّث تلقائياً كل ساعتين بواسطة GitHub Actions.
     ========================================================= */
  const CONFIG = {
    MATCHES_FILE: "matches.json"
  };

  /* =========================================================
     رابط البث المباشر الحالي — عدّله يدوياً وقت أي مباراة تريد بثها
     =========================================================
     الرابط الآن يُقرأ من ملف stream.json بدل هذا المتغير (انظر الشرح أدناه)
     ========================================================= */

  const matchListEl = document.getElementById('matchList');
  const streamFrame = document.getElementById('streamFrame');
  const streamPlaceholder = document.getElementById('streamPlaceholder');
  const streamTitle = document.getElementById('streamTitle');
  const streamSection = document.getElementById('streamSection');

  /* -----------------------------------------------------------
     تهيئة المشغل الرئيسي عند تحميل الصفحة
     الرابط يُقرأ من ملف stream.json (بدل تعديل الكود)، لتغييره فقط
     افتح stream.json وعدّل قيمة "url"، بدون لمس هذا الملف مستقبلاً
  ----------------------------------------------------------- */
  async function initPlayer(){
    let streamUrl = '';
    try{
      const res = await fetch(`stream.json?t=${Date.now()}`);
      if(res.ok){
        const data = await res.json();
        streamUrl = (data && data.url) ? data.url.trim() : '';
      }
    }catch(err){
      console.error('تعذّر قراءة stream.json', err);
    }

    const hasValidUrl = !!streamUrl;

    if(hasValidUrl){
      streamFrame.src = streamUrl;
      streamFrame.style.display = 'block';
      streamPlaceholder.style.display = 'none';
    } else {
      streamFrame.style.display = 'none';
      streamPlaceholder.style.display = 'flex';
    }
  }

  /* =========================================================
     قاموس أعلام منتخبات كأس العالم 2026 (اسم الفريق → كود الدولة لـ flagcdn.com)
     نستخدم صور أعلام حقيقية بدل رموز Emoji لأن بعض الأعلام (كإنجلترا/اسكتلندا/ويلز)
     لا تُعرض بشكل صحيح على أغلب أجهزة أندرويد
     ========================================================= */
  const TEAM_FLAG_CODES = {
    'Morocco': 'ma', 'Canada': 'ca', 'Paraguay': 'py', 'France': 'fr',
    'Brazil': 'br', 'Norway': 'no', 'England': 'gb-eng', 'Mexico': 'mx',
    'Spain': 'es', 'Portugal': 'pt', 'Belgium': 'be', 'United States': 'us',
    'Egypt': 'eg', 'Argentina': 'ar', 'Colombia': 'co', 'Switzerland': 'ch',
    'Ghana': 'gh', 'Germany': 'de', 'Netherlands': 'nl', 'Croatia': 'hr',
    'Italy': 'it', 'Uruguay': 'uy', 'Japan': 'jp', 'South Korea': 'kr',
    'Senegal': 'sn', 'Nigeria': 'ng', 'Cameroon': 'cm', 'Tunisia': 'tn',
    'Algeria': 'dz', 'Saudi Arabia': 'sa', 'Qatar': 'qa', 'Iran': 'ir',
    'Australia': 'au', 'Ecuador': 'ec', 'Chile': 'cl', 'Peru': 'pe',
    'Poland': 'pl', 'Serbia': 'rs', 'Denmark': 'dk', 'Sweden': 'se',
    'Wales': 'gb-wls', 'Scotland': 'gb-sct', 'Ireland': 'ie', 'Austria': 'at',
    'Turkey': 'tr', 'Ukraine': 'ua', 'Czech Republic': 'cz', 'Greece': 'gr',
    'Panama': 'pa', 'Costa Rica': 'cr', 'Jamaica': 'jm', 'New Zealand': 'nz',
  };

  function getTeamFlagHtml(teamName){
    const textFlags = { 'England': 'ENG', 'Scotland': 'SCO', 'Wales': 'WAL' };
    if(textFlags[teamName]){
      return `<span class="team-flag-text">${textFlags[teamName]}</span>`;
    }
    const code = TEAM_FLAG_CODES[teamName];
    if(code){
      return `<img class="team-flag-img" src="https://flagcdn.com/w80/${code}.png" alt="${escapeHtml(teamName)}" loading="lazy" onerror="this.outerHTML='<span class=\\'team-flag\\'>⚽</span>'">`;
    }
    return `<span class="team-flag">⚽</span>`;
  }

  /* -----------------------------------------------------------
     دالة عرض قائمة المباريات في الواجهة
     تتوقع مصفوفة عناصر بالشكل التالي (عدّلها حسب استجابة API الخاص بك):
     {
       home: "اسم الفريق الأول",
       away: "اسم الفريق الثاني",
       league: "اسم البطولة",
       time: "20:00",
       isLive: false   // true إذا كانت المباراة جارية الآن
     }
  ----------------------------------------------------------- */
  function renderMatches(matches){
    matchListEl.innerHTML = "";

    if(!matches || matches.length === 0){
      matchListEl.innerHTML = '<div class="list-state">لا توجد مباريات مجدولة اليوم</div>';
      return;
    }

    matches.forEach((match) => {
      const item = document.createElement('div');
      const hasStream = match.isLive;

      item.className = 'match-item' + (hasStream ? '' : ' disabled');

      if(hasStream){
        item.setAttribute('tabindex', '0');
        item.setAttribute('role', 'button');
      }

      // تحديد نص/شارة الحالة: مباشر الآن (مع النتيجة الحية وضربات الجزاء إن وُجدت) / انتهت + النتيجة / لم تبدأ بعد
      let statusLabel = 'لم تبدأ بعد';
      let statusClass = '';
      const hasScore = match.homeScore !== null && match.homeScore !== undefined
        && match.awayScore !== null && match.awayScore !== undefined;
      const hasPenalties = match.homePenalties !== null && match.homePenalties !== undefined
        && match.awayPenalties !== null && match.awayPenalties !== undefined;

      if(match.isLive){
        statusClass = 'live';
        const scorePart = hasScore ? `${match.homeScore} - ${match.awayScore}` : '';
        const penaltiesPart = hasPenalties ? ` (ركلات ترجيح ${match.homePenalties} - ${match.awayPenalties})` : '';
        statusLabel = scorePart
          ? `${scorePart}${penaltiesPart} · مباشر الآن`
          : 'مباشر الآن';
      } else if(match.isFinished){
        statusLabel = hasScore
          ? `انتهت ${match.homeScore} - ${match.awayScore}`
          : 'انتهت';
        statusClass = 'finished';
      }

      item.innerHTML = `
        <div class="match-league-header">🏆 ${escapeHtml(match.league || '')}</div>
        <div class="match-card-body">
          <div class="match-team">
            ${getTeamFlagHtml(match.home)}
            <span class="team-name">${escapeHtml(match.home)}</span>
          </div>
          <div class="match-center">
            ${!match.isLive && !match.isFinished ? `<span class="match-clock">${escapeHtml(match.time || '')}</span>` : ''}
            <span class="match-status-pill ${statusClass}">${statusLabel}</span>
          </div>
          <div class="match-team">
            ${getTeamFlagHtml(match.away)}
            <span class="team-name">${escapeHtml(match.away)}</span>
          </div>
        </div>
      `;

      if(hasStream){
        const openStream = () => goToStream(match);
        item.addEventListener('click', openStream);
        item.addEventListener('keydown', (e) => {
          if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); openStream(); }
        });
      }

      matchListEl.appendChild(item);
    });

    // ضبط ارتفاع القائمة تلقائياً ليعرض 5 مباريات بالضبط قبل التمرير الداخلي
    const items = matchListEl.querySelectorAll('.match-item');
    if(items.length > 5){
      const gap = 10; // يطابق قيمة gap في CSS الخاصة بـ .match-list
      let heightForFive = 0;
      for(let i = 0; i < 5; i++){
        heightForFive += items[i].offsetHeight;
      }
      heightForFive += gap * 4; // 4 فجوات بين 5 عناصر
      matchListEl.style.maxHeight = `${heightForFive}px`;
      matchListEl.style.overflowY = 'auto';
    } else {
      matchListEl.style.maxHeight = 'none';
      matchListEl.style.overflowY = 'visible';
    }
  }

  /* -----------------------------------------------------------
     عند الضغط على مباراة جارية حالياً: الانتقال لقسم البث
     المشغل يعرض دائماً نفس CURRENT_LIVE_STREAM_URL، فقط ينتقل إليه ويحدّث العنوان
  ----------------------------------------------------------- */
  function goToStream(match){
    streamTitle.textContent = `${match.home} ضد ${match.away}`;
    streamSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function escapeHtml(str){
    return String(str ?? "")
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;");
  }

  /* -----------------------------------------------------------
     جلب بيانات مباريات اليوم من ملف matches.json (بدون أي مفتاح)
  ----------------------------------------------------------- */
  async function loadTodayMatches(){
    try{
      // إضافة معامل عشوائي لمنع المتصفح من تخزين نسخة قديمة (Cache)
      const res = await fetch(`${CONFIG.MATCHES_FILE}?t=${Date.now()}`);
      if(!res.ok) throw new Error('تعذّر قراءة ملف matches.json');

      const data = await res.json();
      const matches = Array.isArray(data) ? data : (data.matches || []);

      renderMatches(matches);
    }catch(err){
      matchListEl.innerHTML = '<div class="list-state">تعذّر تحميل المباريات حالياً، حاول لاحقاً.</div>';
      console.error(err);
    }
  }

  initPlayer();
  loadTodayMatches();
</script>

</body>
</html>
